<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Melike & Elif Pastanesi - Giriş</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --peony: #f7edee;
        --mauve: #d8959b;
        --evergreen: #5c705a;
        --white: #ffffff;
      }

      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;

        background-color: #fce8ea;
        background-image:
          radial-gradient(
            circle at 15% 25%,
            rgba(216, 149, 155, 0.65),
            transparent 50%
          ),
          radial-gradient(
            circle at 85% 75%,
            rgba(92, 112, 90, 0.45),
            transparent 50%
          ),
          radial-gradient(
            circle at 50% 50%,
            rgba(255, 255, 255, 0.3),
            transparent 60%
          );
      }

      .login-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        padding: 35px 45px;
        border-radius: 30px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 420px;
        text-align: center;
      }

      .logo-wrapper {
        margin-bottom: 10px;
      }

      .custom-logo {
        width: 220px;
        height: auto;
        mix-blend-mode: multiply;
        transition: transform 0.3s ease;
      }

      .login-title {
        color: var(--evergreen);
        font-size: 25px;
        font-weight: 800;
        margin-bottom: 5px;
        margin-top: 5px;
        letter-spacing: -0.5px;
      }

      .login-subtitle {
        color: #777;
        font-size: 14px;
        margin-bottom: 25px;
        font-weight: 500;
      }

      .input-group {
        position: relative;
        margin-bottom: 16px;
      }

      .login-input {
        width: 100%;
        padding: 16px 20px 16px 55px;
        border: 2px solid transparent;
        border-radius: 16px;
        background-color: rgba(247, 237, 238, 0.8);
        color: var(--mauve);
        font-size: 15px;
        font-weight: 600;
        box-sizing: border-box;
        transition: all 0.3s ease;
      }

      .login-input::placeholder {
        color: #cfa8ac;
        font-weight: 500;
      }

      .login-input:focus {
        outline: none;
        border-color: var(--mauve);
        background-color: var(--white);
        box-shadow: 0 0 15px rgba(216, 149, 155, 0.2);
      }

      .input-group .icon-left {
        position: absolute;
        left: 22px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--mauve);
        font-size: 17px;
      }

      .btn-login {
        width: 100%;
        padding: 16px;
        background-color: var(--mauve);
        color: var(--white);
        border: none;
        border-radius: 16px;
        font-size: 17px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 5px;
        letter-spacing: 0.5px;
        box-shadow: 0 4px 15px rgba(216, 149, 155, 0.3);
      }

      .btn-login:hover {
        background-color: #c27d83;
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(216, 149, 155, 0.5);
      }

      .register-link {
        margin-top: 20px;
        font-size: 13px;
        color: #666;
      }

      .register-link a {
        color: var(--mauve);
        font-weight: bold;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="logo-wrapper">
        <img src="logo.png" alt="Melike & Elif Pastanesi" class="custom-logo" />
      </div>

      <h2 class="login-title">Yönetim Paneli</h2>
      <p class="login-subtitle">Sisteme erişmek için bilgilerinizi girin.</p>

      <form id="login-form" action="/frontend/index.html" autocomplete="off">
        <div class="input-group">
          <i class="fas fa-envelope icon-left"></i>
          <input
            type="email"
            id="login-email"
            class="login-input"
            required
            placeholder="E-posta Adresi"
            autocomplete="off"
          />
        </div>

        <div class="input-group">
          <i class="fas fa-lock icon-left"></i>
          <input
            type="password"
            class="login-input"
            required
            placeholder="Şifre"
            autocomplete="new-password"
          />
        </div>

        <button type="submit" class="btn-login">Güvenli Giriş Yap</button>
      </form>

      <div class="register-link">
        Hesabınız yok mu? <a href="/frontend/register.html">Hemen Üye Olun</a>
      </div>
    </div>

    <script>
      document
        .getElementById("login-form")
        .addEventListener("submit", function (e) {
          const email = document
            .getElementById("login-email")
            .value.toLowerCase();
          let isim = "Kullanıcı";

          if (email.includes("melike")) {
            isim = "Melike";
          } else if (email.includes("elif")) {
            isim = "Elif";
          } else {
            // Eğer özel bir isimse, @ işaretinden öncesini alır ve ilk harfini büyük yapar
            const temizParca = email.split("@")[0];
            isim = temizParca.charAt(0).toUpperCase() + temizParca.slice(1);
          }

          localStorage.setItem("aktifKullaniciAdi", isim);
        });
    </script>
  </body>
</html>
