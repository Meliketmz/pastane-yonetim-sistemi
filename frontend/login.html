<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Melike & Elif Pastanesi - Giriş</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --peony: #f7edee;
        --mauve: #d8959b;
        --evergreen: #5c705a;
        --white: #ffffff;
      }

      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;

        background-color: #fce8ea;
        background-image:
          radial-gradient(
            circle at 15% 25%,
            rgba(216, 149, 155, 0.65),
            transparent 50%
          ),
          radial-gradient(
            circle at 85% 75%,
            rgba(92, 112, 90, 0.45),
            transparent 50%
          ),
          radial-gradient(
            circle at 50% 50%,
            rgba(255, 255, 255, 0.3),
            transparent 60%
          );
      }

      .login-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        padding: 35px 45px;
        border-radius: 30px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 420px;
        text-align: center;
      }

      .logo-wrapper {
        margin-bottom: 10px;
      }

      .custom-logo {
        width: 220px;
        height: auto;
        mix-blend-mode: multiply;
        transition: transform 0.3s ease;
      }

      .login-title {
        color: var(--evergreen);
        font-size: 25px;
        font-weight: 800;
        margin-bottom: 5px;
        margin-top: 5px;
        letter-spacing: -0.5px;
      }

      .login-subtitle {
        color: #777;
        font-size: 14px;
        margin-bottom: 25px;
        font-weight: 500;
      }

      .input-group {
        position: relative;
        margin-bottom: 16px;
      }

      .login-input {
        width: 100%;
        padding: 16px 20px 16px 55px;
        border: 2px solid transparent;
        border-radius: 16px;
        background-color: rgba(247, 237, 238, 0.8);
        color: var(--mauve);
        font-size: 15px;
        font-weight: 600;
        box-sizing: border-box;
        transition: all 0.3s ease;
      }

      .login-input::placeholder {
        color: #cfa8ac;
        font-weight: 500;
      }

      .login-input:focus {
        outline: none;
        border-color: var(--mauve);
        background-color: var(--white);
        box-shadow: 0 0 15px rgba(216, 149, 155, 0.2);
      }

      .input-group .icon-left {
        position: absolute;
        left: 22px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--mauve);
        font-size: 17px;
      }

      .btn-login {
        width: 100%;
        padding: 16px;
        background-color: var(--mauve);
        color: var(--white);
        border: none;
        border-radius: 16px;
        font-size: 17px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 5px;
        letter-spacing: 0.5px;
        box-shadow: 0 4px 15px rgba(216, 149, 155, 0.3);
      }

      .btn-login:hover {
        background-color: #c27d83;
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(216, 149, 155, 0.5);
      }

      .register-link {
        margin-top: 20px;
        font-size: 13px;
        color: #666;
      }

      .register-link a {
        color: var(--mauve);
        font-weight: bold;
        text-decoration: none;
      }

      /* YENİ: Hata Modalı CSS Tasarımı */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(5px);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        z-index: 9999;
      }
      .modal-overlay.active {
        opacity: 1;
        visibility: visible;
      }
      .modal-box {
        background: var(--white);
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        max-width: 350px;
        width: 90%;
        transform: translateY(20px);
        transition: all 0.3s ease;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        border-top: 5px solid var(--mauve);
      }
      .modal-overlay.active .modal-box {
        transform: translateY(0);
      }
      .modal-icon {
        color: var(--mauve);
        font-size: 50px;
        margin-bottom: 15px;
      }
      .modal-box h3 {
        color: var(--mauve);
        margin: 0 0 10px 0;
      }
      .modal-box p {
        color: #666;
        font-size: 14px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="logo-wrapper">
        <img src="logo.png" alt="Melike & Elif Pastanesi" class="custom-logo" />
      </div>

      <h2 class="login-title">Yönetim Paneli</h2>
      <p class="login-subtitle">Sisteme erişmek için bilgilerinizi girin.</p>

      <form id="login-form" autocomplete="off" novalidate>
        <div class="input-group">
          <i class="fas fa-envelope icon-left"></i>
          <input
            type="email"
            id="login-email"
            class="login-input"
            required
            placeholder="E-posta Adresi"
            autocomplete="off"
          />
        </div>

        <div class="input-group">
          <i class="fas fa-lock icon-left"></i>
          <input
            type="password"
            id="login-password"
            class="login-input"
            required
            placeholder="Şifre"
            autocomplete="new-password"
          />
        </div>

        <button type="submit" class="btn-login">Güvenli Giriş Yap</button>
      </form>

      <div class="register-link">
        Hesabınız yok mu? <a href="/frontend/register.html">Hemen Üye Olun</a>
      </div>
    </div>

    <div class="modal-overlay" id="error-modal">
      <div class="modal-box">
        <i class="fas fa-exclamation-circle modal-icon"></i>
        <h3>Giriş Başarısız</h3>
        <p id="error-message">
          Kaydınız bulunmamakta veya şifreniz hatalı. Lütfen üye olun.
        </p>
        <button
          type="button"
          class="btn-login"
          id="btn-close-modal"
          style="width: auto; padding: 10px 30px; margin-top: 0"
        >
          Tamam
        </button>
      </div>
    </div>

    <script src="js/services/api.js"></script>

    <script src="js/services/api.js"></script>

    <script>
      const modal = document.getElementById("error-modal");
      const btnCloseModal = document.getElementById("btn-close-modal");

      btnCloseModal.addEventListener("click", () => {
        modal.classList.remove("active");
      });

      document
        .getElementById("login-form")
        .addEventListener("submit", async function (e) {
          e.preventDefault(); // Sayfanın hemen yenilenmesini durdur

          const email = document.getElementById("login-email").value.trim();
          const sifre = document.getElementById("login-password").value.trim();

          if (!email || !sifre) {
            document.getElementById("error-message").innerText =
              "Lütfen e-posta ve şifrenizi eksiksiz girin.";
            modal.classList.add("active");
            return;
          }

          try {
            // Arka planda veritabanına soruyoruz
            const response = await apiService.girisYap({ email, sifre });

            // Token'ı ve İsmi tarayıcıya kaydediyoruz
            localStorage.setItem("token", response.token);

            const gercekIsim = response.kullanici.ad_soyad.split(" ")[0];
            localStorage.setItem("aktifKullaniciAdi", gercekIsim);

            // Güvenliği geçtiğine göre paneli aç
            window.location.href = "/frontend/index.html";
          } catch (error) {
            // Hata varsa modalı göster
            document.getElementById("error-message").innerText = error.message;
            modal.classList.add("active");
          }
        }); // İŞTE SİLİNEN KAPANIŞ PARANTEZLERİ BURADA!
    </script>
  </body>
</html>
