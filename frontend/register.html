<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Melike & Elif Pastanesi - Aramıza Katılın</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/variables.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: #f3e9e9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .auth-container {
        background: white;
        width: 550px;
        max-width: 100%;
        padding: 50px 40px;
        border-radius: 32px;
        box-shadow: 0 15px 35px rgba(143, 110, 114, 0.15);
        text-align: center;
      }

      .auth-title {
        color: #5d6b59;
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 15px;
      }

      .auth-subtitle {
        color: #8c7b7d;
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 35px;
        padding: 0 10px;
      }

      .form-group {
        position: relative;
        margin-bottom: 20px;
      }

      .form-group i {
        position: absolute;
        left: 25px;
        top: 50%;
        transform: translateY(-50%);
        color: #d6727e;
        font-size: 16px;
      }

      .form-input {
        width: 100%;
        height: 56px;
        background-color: #fcf2f2;
        border: none;
        border-radius: 50px;
        padding: 0 25px 0 60px;
        font-size: 15px;
        font-weight: 600;
        color: #5a4b4c;
        outline: none;
        transition: all 0.25s ease;
      }

      .form-input::placeholder {
        color: #a69597;
        font-weight: 600;
      }

      #ad_soyad {
        text-transform: uppercase;
      }

      .btn-auth-submit {
        width: 100%;
        height: 56px;
        background-color: #5d6b59;
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 15px;
        margin-bottom: 25px;
        transition: all 0.25s ease;
        box-shadow: 0 6px 15px rgba(93, 107, 89, 0.25);
      }

      .btn-auth-submit:hover {
        background-color: #4a5646;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(93, 107, 89, 0.35);
      }

      .btn-auth-submit:active {
        transform: translateY(1px);
      }

      .auth-footer {
        color: #8c7b7d;
        font-size: 14px;
        font-weight: 600;
      }

      .auth-footer a {
        color: #d6727e;
        text-decoration: none;
        font-weight: 700;
        margin-left: 4px;
        transition: color 0.2s;
      }

      .auth-footer a:hover {
        color: #b35662;
      }

      /* MODAL STİLLERİ */
      .custom-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(90, 62, 54, 0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s ease;
      }

      .custom-modal.active {
        opacity: 1;
        pointer-events: auto;
      }

      .modal-box {
        background: #fffaf7;
        padding: 40px 30px;
        border-radius: 28px;
        width: 440px;
        max-width: 90%;
        text-align: center;
        box-shadow: 0 15px 40px rgba(90, 62, 54, 0.2);
        transform: scale(0.8);
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      }

      .custom-modal.active .modal-box {
        transform: scale(1);
      }

      .btn-modal-ok {
        color: white;
        border: none;
        border-radius: 50px;
        padding: 12px 45px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 5px;
      }

      .btn-modal-ok:hover {
        transform: translateY(-2px);
      }

      .btn-modal-ok:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <h2 class="auth-title">Aramıza Katılın</h2>
      <p class="auth-subtitle">
        Melike & Elif Pastanesi yönetim paneline erişmek için bir hesap
        oluşturun.
      </p>

      <form id="register-form" autocomplete="off" novalidate>
        <input type="text" style="display: none" name="fake-user" />
        <input type="email" style="display: none" name="fake-email" />
        <input type="password" style="display: none" name="fake-pass" />

        <div class="form-group">
          <i class="fas fa-user"></i>
          <input
            type="text"
            id="ad_soyad"
            name="ad_soyad"
            class="form-input"
            placeholder="Adınız Soyadınız"
            required
            autocomplete="off"
            oninput="this.value = this.value.toLocaleUpperCase('tr-TR')"
          />
        </div>

        <div class="form-group">
          <i class="fas fa-envelope"></i>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="E-posta Adresi"
            required
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <i class="fas fa-lock"></i>
          <input
            type="password"
            id="sifre"
            name="sifre"
            class="form-input"
            placeholder="Şifre Belirleyin"
            required
            autocomplete="off"
            readonly
            onfocus="this.removeAttribute('readonly')"
          />
        </div>

        <button type="submit" class="btn-auth-submit">Hemen Üye Ol</button>
      </form>

      <div class="auth-footer">
        Zaten hesabınız var mı?<a href="login.html">Giriş Yap</a>
      </div>
    </div>

    <div id="error-modal" class="custom-modal">
      <div class="modal-box">
        <i
          class="fas fa-exclamation-circle"
          style="color: #d6727e; font-size: 54px; margin-bottom: 18px"
        ></i>
        <h3
          style="
            color: #5a3e36;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
          "
        >
          Eksik veya Hatalı Bilgi
        </h3>
        <p
          id="error-message"
          style="
            color: #7a625a;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 25px;
            padding: 0 10px;
          "
        ></p>
        <button
          type="button"
          id="btn-error-ok"
          class="btn-modal-ok"
          style="
            background-color: #d6727e;
            box-shadow: 0 4px 12px rgba(214, 114, 126, 0.3);
          "
        >
          Anladım
        </button>
      </div>
    </div>

    <div id="success-modal" class="custom-modal">
      <div class="modal-box">
        <i
          class="fas fa-check-circle"
          style="color: #5d6b59; font-size: 54px; margin-bottom: 18px"
        ></i>
        <h3
          style="
            color: #5a3e36;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
          "
        >
          Aramıza Hoş Geldiniz!
        </h3>
        <p
          style="
            color: #7a625a;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 25px;
            padding: 0 10px;
          "
        >
          Hesabınız başarıyla oluşturuldu.<br />Şimdi giriş yapıp lezzetleri
          yönetmeye başlayabilirsiniz!
        </p>
        <button
          type="button"
          id="btn-success-ok"
          class="btn-modal-ok"
          style="
            background-color: #5d6b59;
            box-shadow: 0 4px 12px rgba(93, 107, 89, 0.3);
          "
        >
          Giriş Yap
        </button>
      </div>
    </div>

    <script src="js/services/api.js"></script>
    <script>
      // Hata Modalını Kapatma Fonksiyonu
      function showError(msg) {
        const errorModal = document.getElementById("error-modal");
        const errorMessage = document.getElementById("error-message");
        if (errorModal && errorMessage) {
          errorMessage.innerText = msg;
          errorModal.classList.add("active");
        } else {
          alert(msg);
        }
      }

      document.getElementById("btn-error-ok").addEventListener("click", () => {
        document.getElementById("error-modal").classList.remove("active");
      });

      document
        .getElementById("register-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const ad_soyad = document.getElementById("ad_soyad").value.trim();
          const email = document.getElementById("email").value.trim();
          const sifre = document.getElementById("sifre").value;

          // 🌟 MANUEL DENETİMLER: Tarayıcı balon patlatmasın diye kod kontrolü
          if (!ad_soyad) {
            showError("Lütfen adınızı ve soyadınızı yazın.");
            return;
          }
          if (!email) {
            showError("Lütfen e-posta adresinizi yazın.");
            return;
          }

          // Akıllı E-posta Kontrol Regex'i (Baloncuğu tamamen önler)
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRegex.test(email)) {
            showError(
              "Lütfen geçerli bir e-posta adresi girin.\n(Örn: lezzet@pastane.com)",
            );
            return;
          }

          if (!sifre) {
            showError("Lütfen hesabınız için bir şifre belirleyin.");
            return;
          }

          const btn = document.querySelector(".btn-auth-submit");
          const orijinalMetin = btn.innerText;
          btn.innerText = "Hesap Oluşturuluyor...";
          btn.disabled = true;

          try {
            await apiService.kayitOl({ ad_soyad, email, sifre });

            const successModal = document.getElementById("success-modal");
            if (successModal) {
              successModal.classList.add("active");
              document.getElementById("btn-success-ok").onclick = () => {
                window.location.href = "login.html";
              };
            } else {
              window.location.href = "login.html";
            }
          } catch (error) {
            showError(error.message);
          } finally {
            btn.innerText = orijinalMetin;
            btn.disabled = false;
          }
        });
    </script>
  </body>
</html>
